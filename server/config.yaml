server:
  host: "0.0.0.0"
  port: 8088
  admin_host: "127.0.0.1"
  admin_port: 8089
  api_prefix: "/delta-sharing"

cos:
  region: "ap-shanghai"
  secret_id: "${COS_SECRET_ID}"
  secret_key: "${COS_SECRET_KEY}"
  endpoint: "cos.ap-shanghai.myqcloud.com" # cos.accelerate.myqcloud.com cos.ap-shanghai.myqcloud.com

database:
  url: "sqlite:///./data/server.db"
  pool:
    pool_type: "null_pool"
    pool_size: 10
    max_overflow: 20
    pool_recycle: 3600
    pool_timeout: 10
    pool_pre_ping: true

token:
  rotation_period_hours: 24
  max_tokens_per_recipient: 2
  expiration_hours: 168

presigned_url:
  expiration_hours: 6
  min_expiration_hours: 1
  max_expiration_hours: 168

shares:
  use_database: true
  fallback_file: "./config.yaml"
  myshare:
    schemas:
      myschema:
        tables:
          ice_t1:
            location: "cosn://YOUR_BUCKET/delta/ice_t1"
            metastore_db: "playground"
            metastore_table: "ice_t1"
  needn_share:
    schemas:
      needn_schema:
        tables:
          ice_t1:
            location: "cosn://YOUR_BUCKET/delta/ice_t1"
            metastore_db: "playground"
            metastore_table: "ice_t1"
          ice_t2:
            location: "cosn://YOUR_BUCKET/delta/ice_t2"
            metastore_db: "playground"
            metastore_table: "ice_t2"

logging:
  log_dir: "./log"
  app_log_level: "INFO"
  app_log_retention: "30 days"
  audit_log_level: "INFO"
